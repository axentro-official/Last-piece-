<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Last Piece</title>

  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>

<header class="header">
  <div class="cart">🛒</div>

  <div class="brand">
    <span class="brand-name">LAST PIECE</span>
    <img src="./assets/images/logo.png" class="logo"/>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <button class="hero-btn left" onclick="prevHero()">‹</button>
  <img id="heroImage" />
  <button class="hero-btn right" onclick="nextHero()">›</button>

  <div class="hero-overlay">
    <h2>العروض الخاصة</h2>
    <p>منتجات حصرية بأسعار قبل الخصم</p>
  </div>
</section>

<section class="products">
  <h2 class="section-title">منتجات مختارة</h2>
  <div id="products" class="grid"></div>
</section>

<footer class="footer">

  <div class="top-footer">
    <p>Axentro – All Rights Reserved 2024 ©</p>
    <p>By Axentro Team</p>
  </div>

  <div class="axentro">
    <p class="ax-title">Axentro</p>

    <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
      <img src="./assets/images/qr.png" class="qr"/>
    </a>

    <p class="scan-text">Scan Me / Click On Me</p>
  </div>

  <div class="brand-footer">
    © 2026 Last piece, Inc.
  </div>

</footer>

<script src="./assets/js/app.js"></script>
</body>
</html>
