<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/style.css">
<title>Last Piece</title>
</head>

<body>

<header class="container">
  <img src="assets/images/logo.png" class="logo">
  <div class="cart-icon" onclick="toggleCart()">🛒</div>
</header>

<div class="container">

<!-- HERO -->
<div class="slider" id="slider"></div>
<div class="dots" id="dots"></div>

<!-- SWITCH -->
<div class="tabs">
  <button onclick="filterProducts('all')" class="active">المنتجات</button>
  <button onclick="filterProducts('sale')">العروض</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

</div>

<!-- CART -->
<div class="cart" id="cart"></div>

<!-- FOOTER -->
<footer>
  <div>Last Piece © 2026</div>

  <div class="footer-center">
    © 2024 Axentro – All Rights Reserved <br>
    By Axentro Team
    <br>
    <img src="assets/images/qr.png"
    onclick="window.open('https://axentro-official.github.io/axentro-website/links.html')">
    <p>Scan Me / Click On Me</p>
  </div>
</footer>

<script src="assets/js/app.js"></script>
<script src="assets/js/cart.js"></script>

</body>
</html>
