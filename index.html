<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Last Piece</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <img src="images/logo.png">
  </div>

  <div class="center">
    <h1>LAST PIECE</h1>
    <p class="slogan">Elegance Defined, One Piece at a Time</p>

    <nav>
      <a href="#">المنتجات</a>
      <a href="#">التخفيضات</a>
    </nav>
  </div>

  <div class="cart" onclick="toggleCart()">🛒</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="slider">
    <img src="images/hero1.webp" class="active">
    <img src="images/hero2.webp">
    <img src="images/hero3.webp">
    <img src="images/hero4.webp">
    <img src="images/hero5.webp">
    <img src="images/hero6.webp">

    <button class="prev">‹</button>
    <button class="next">›</button>
    <div class="dots"></div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products-section">
  <h2 class="section-title">المنتجات</h2>
  <div id="products" class="products-grid"></div>

  <h2 class="section-title">التخفيضات</h2>
  <div id="offers" class="products-grid"></div>
</section>

<!-- CART -->
<div id="cartPanel" class="cart-panel">
  <div class="cart-header">
    <h2>السلة</h2>
    <span onclick="toggleCart()">✖</span>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <h3 id="cartTotal">الإجمالي: 0 ج</h3>
    <button onclick="clearCart()" class="btn-danger">تفريغ السلة</button>
    <button onclick="goCheckout()" class="btn-primary">إتمام الطلب</button>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div>© 2026 Last-Piece, Inc.</div>
  <div class="center">
    <p>© 2024 Axentro – All Rights Reserved</p>
    <p>By Axentro Team</p>
    <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
      <img src="images/qr.png" class="qr">
      <p>Scan me > Click On Me</p>
    </a>
  </div>
</footer>

<script src="app.js"></script>

<!-- HERO SCRIPT -->
<script>
const slides = document.querySelectorAll(".slider img");
const next = document.querySelector(".next");
const prev = document.querySelector(".prev");
const dots = document.querySelector(".dots");

let index = 0;

slides.forEach((_, i)=>{
  const d = document.createElement("span");
  d.onclick = ()=>go(i);
  dots.appendChild(d);
});

function show(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.querySelectorAll("span").forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots.children[i].classList.add("active");
}

function go(i){
  index=i;
  show(i);
}

next.onclick=()=>go((index+1)%slides.length);
prev.onclick=()=>go((index-1+slides.length)%slides.length);

setInterval(()=>go((index+1)%slides.length),2000);

show(0);
</script>

</body>
</html>
