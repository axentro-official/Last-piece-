<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Last Piece</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>

<header class="header">
  <div class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></div>

  <div class="brand">
    <span class="brand-name">LAST PIECE</span>
    <img src="./assets/images/logo.png" class="logo"/>
  </div>
</header>

<section class="filter">
  <button onclick="filterCategory('all')">الكل</button>
  <button onclick="filterCategory('tshirt')">تيشيرت</button>
  <button onclick="filterCategory('jeans')">جينز</button>
</section>

<section class="products">
  <div id="products" class="grid"></div>
</section>

<!-- CART -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <h3>السلة</h3>
    <div id="cartItems"></div>
    <h4 id="total"></h4>
    <button onclick="goCheckout()">إتمام الطلب</button>
    <button onclick="closeCart()">إغلاق</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <input id="name" placeholder="الاسم" />
    <input id="phone" placeholder="رقم الموبايل" />
    <input id="address" placeholder="العنوان" />
    <button onclick="submitOrder()">تأكيد</button>
  </div>
</div>

<script src="./assets/js/app.js"></script>
</body>
</html>
