<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>إدارة الفواتير - Last Piece</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#FAF9F6; /* Cream Background from New Site */
      --card:#ffffff;
      --text:#0d0d0d; /* Black Deep from New Site */
      --muted:#64748b;
      --stroke:rgba(15,23,42,.10);
      --shadow:0 18px 50px rgba(2,6,23,.12);
      
      /* Branding */
      --gold:#D4AF37;
      --gold-dark:#B8860B;
      --black-deep:#0d0d0d;

      --radius:20px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Tajawal', sans-serif;
      color:var(--text);
      background: var(--bg);
      padding:15px;
      min-height:100vh;
    }

    .wrap{ max-width:1100px; margin:0 auto; }

    /* Login Box Styles */
    #loginBox{
      position:fixed; inset:0; background:rgba(13,13,13,0.85);
      display:flex; align-items:center; justify-content:center; z-index:999;
      backdrop-filter:blur(8px);
    }
    .loginCard{
      background:#fff; padding:30px; border-radius:25px;
      box-shadow:0 25px 50px rgba(0,0,0,0.2);
      text-align:center; width:90%; max-width:400px;
      border:2px solid var(--gold);
    }
    .loginLogo{ width:80px; height:80px; margin:0 auto 15px; border-radius:50%; border:2px solid var(--gold); padding:5px; }
    .loginLogo img{ width:100%; height:100%; object-fit:contain; }
    .loginTitle{ font-family:'Playfair Display', serif; font-size:26px; font-weight:900; background:linear-gradient(135deg, var(--gold), var(--gold-dark)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .loginSub{ color:var(--muted); font-size:14px; margin-bottom:20px; }
    
    input{
      width:100%; padding:12px; border-radius:12px; border:2px solid #eee;
      font-family:'Tajawal'; font-size:16px; margin-bottom:15px;
      text-align:center; transition:0.2s;
    }
    input:focus{ border-color:var(--gold); outline:none; }
    
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:12px 25px; border-radius:30px; border:none;
      font-family:'Tajawal'; font-weight:700; font-size:16px;
      cursor:pointer; transition:0.3s;
    }
    .btn-gold{
      background:linear-gradient(135deg, var(--gold), var(--gold-dark));
      color:#fff; box-shadow:0 5px 15px rgba(212,175,55,0.3);
    }
    .btn-gold:hover{ transform:translateY(-2px); box-shadow:0 8px 25px rgba(212,175,55,0.5); }
    .btn-outline{ background:#fff; border:2px solid var(--gold); color:var(--black-deep); }
    .btn-dark{ background:var(--black-deep); color:#fff; }

    /* App Styles */
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      padding:15px; background:#fff; border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-bottom:20px;
    }
    .brand{ display:flex; align-items:center; gap:10px; }
    .brand img{ width:40px; height:40px; border-radius:50%; }
    .brandName{ font-family:'Playfair Display', serif; font-weight:900; font-size:20px; color:var(--gold); }
    
    .card{
      background:#fff; border-radius:var(--radius);
      padding:20px; margin-bottom:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.03);
    }
    
    h2{ font-family:'Playfair Display', serif; color:var(--black-deep); border-bottom:2px solid var(--gold); display:inline-block; padding-bottom:5px; margin:0 0 15px; }
    
    label{ display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:700; }
    
    .grid-4{ display:grid; grid-template-columns:repeat(4, 1fr); gap:15px; }
    .grid-2{ display:grid; grid-template-columns:repeat(2, 1fr); gap:15px; }
    
    /* Table */
    .table-wrap{ overflow:auto; border:1px solid #eee; border-radius:12px; }
    table{ width:100%; border-collapse:collapse; min-width:800px; }
    th, td{ padding:10px; text-align:center; border-bottom:1px solid #eee; }
    th{ background:linear-gradient(135deg, rgba(212,175,55,0.1), #fff); color:var(--black-deep); font-weight:900; }
    .thumbMini{ width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #eee; }
    
    /* Totals */
    .totalLine{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #eee; }
    .totalLine.primary{ border-bottom:none; font-size:20px; color:var(--gold-dark); font-weight:900; }

    @media (max-width: 768px){
      .grid-4, .grid-2{ grid-template-columns:1fr; }
      .topbar{ flex-direction:column; gap:10px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginBox">
  <div class="loginCard">
    <div class="loginLogo">
      <img src="https://axentro-official.github.io/Last-piece-/images/logo.png" alt="Logo">
    </div>
    <div class="loginTitle">Last Piece</div>
    <div class="loginSub">نظام إدارة الفواتير</div>
    <input type="password" id="passInput" placeholder="رمز الدخول">
    <button class="btn btn-gold" style="width:100%" onclick="checkLogin()">دخول</button>
  </div>
</div>

<!-- Main App -->
<div class="wrap" id="app" style="display:none">
  
  <div class="topbar">
    <div class="brand">
      <img src="https://axentro-official.github.io/Last-piece-/images/logo.png">
      <div>
        <div class="brandName">Last Piece</div>
        <div style="font-size:12px; color:#888;">لوحة التحكم</div>
      </div>
    </div>
    <button class="btn btn-outline" onclick="logout()">🔒 خروج</button>
  </div>

  <!-- Search Card -->
  <div class="card">
    <h2>استعلام طلب</h2>
    <div class="grid-4">
      <div style="grid-column: span 3;">
        <input type="text" id="orderIdInput" placeholder="أدخل رقم الطلب (مثال: LP-240521-1234)">
      </div>
      <button class="btn btn-gold" style="height:48px" onclick="fetchOrder()">🔎 جلب الطلب</button>
    </div>
  </div>

  <!-- Invoice Data -->
  <div class="card">
    <h2>بيانات الفاتورة</h2>
    <div class="grid-4">
      <div>
        <label>رقم الفاتورة</label>
        <input type="text" id="invNo" readonly>
      </div>
      <div>
        <label>التاريخ</label>
        <input type="text" id="invDate" readonly>
      </div>
      <div>
        <label>الوقت</label>
        <input type="text" id="invTime" readonly>
      </div>
      <div>
        <label>طريقة الدفع</label>
        <input type="text" id="payMethod" readonly>
      </div>
    </div>
    <div style="height:15px"></div>
    <div class="grid-4">
      <div>
        <label>اسم العميل</label>
        <input type="text" id="custName" readonly>
      </div>
      <div>
        <label>الهاتف</label>
        <input type="text" id="custPhone" readonly>
      </div>
      <div>
        <label>العنوان</label>
        <input type="text" id="custAddress" readonly>
      </div>
      <div>
        <label>ملاحظات</label>
        <input type="text" id="custNotes" readonly>
      </div>
    </div>
  </div>

  <!-- Items Table -->
  <div class="card">
    <h2>المنتجات</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>صورة</th>
            <th>المنتج</th>
            <th>المقاس</th>
            <th>اللون</th>
            <th>الكمية</th>
            <th>السعر</th>
            <th>الإجمالي</th>
          </tr>
        </thead>
        <tbody id="itemsBody">
          <tr><td colspan="8" style="padding:20px; color:#888">لم يتم جلب طلب بعد</td></tr>
        </tbody>
      </table>
    </div>
    <div style="max-width:400px; margin:20px auto 0;">
      <div id="totalsBox"></div>
      <div style="text-align:center; margin-top:15px; font-weight:700; color:#333" id="amountWords"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="card">
    <h2>الطباعة</h2>
    <div class="grid-2">
      <button class="btn btn-outline" onclick="printInvoice('A4')">🖨️ طباعة A4</button>
      <button class="btn btn-outline" onclick="printInvoice('Thermal80')">🧾 طباعة حراري 80mm</button>
    </div>
    <div class="grid-2" style="margin-top:10px;">
       <button class="btn btn-outline" onclick="printInvoice('Thermal58')">🧾 طباعة حراري 58mm</button>
       <button class="btn btn-dark" onclick="savePdf()">📄 حفظ PDF</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const ADMIN_PASSWORD = "1407"; // يمكن تغييره
const API_URL = 'https://script.google.com/macros/s/AKfycbyuLyCqPmG1a2w7Vpgu2hGFFG44tlmW4N9AuNwa-YHRupXRPhxBF-_mEOhPgjpSBwM9/exec';
const IMG_URL = 'https://axentro-official.github.io/Last-piece-/images/';

/* === LOGIN === */
function checkLogin(){
  if(document.getElementById('passInput').value === ADMIN_PASSWORD){
    sessionStorage.setItem('LP_ADMIN', '1');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initInvoice();
  } else alert('خطأ في الرمز');
}
function logout(){
  sessionStorage.removeItem('LP_ADMIN');
  location.reload();
}
if(sessionStorage.getItem('LP_ADMIN') === '1'){
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initInvoice();
}

/* === LOGIC === */
function initInvoice(){
  const now = new Date();
  document.getElementById('invNo').value = 'INV-' + Math.floor(Math.random() * 90000 + 10000);
  document.getElementById('invDate').value = now.toLocaleDateString('en-GB').replace(/\//g,'-');
  document.getElementById('invTime').value = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true});
}

async function fetchOrder(){
  const oid = document.getElementById('orderIdInput').value.trim();
  if(!oid) return alert('أدخل رقم الطلب');
  
  try {
    const res = await fetch(`${API_URL}?action=getOrder&orderId=${oid}`);
    const data = await res.json();
    
    if(data.ok && data.order){
      fillForm(data.order);
    } else {
      alert('لم يتم العثور على الطلب');
    }
  } catch(e){ alert('خطأ في الاتصال'); console.error(e); }
}

function fillForm(order){
  document.getElementById('custName').value = order.customer_name || '-';
  document.getElementById('custPhone').value = order.phone || '-';
  document.getElementById('payMethod').value = order.payment_method || '-';
  document.getElementById('custNotes').value = order.notes || '-';
  
  const fullAddress = `${order.governorate || ''} - ${order.area || ''} - ${order.address || ''}`;
  document.getElementById('custAddress').value = fullAddress;

  if(order.date){
    const dt = new Date(order.date);
    document.getElementById('invDate').value = dt.toLocaleDateString('en-GB').replace(/\//g,'-');
    document.getElementById('invTime').value = dt.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true});
  }

  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';
  let total = 0;

  order.items.forEach((item, i) => {
    const subtotal = item.qty * item.price;
    total += subtotal;
    
    // Construct Image URL
    const imgSrc = `${IMG_URL}${item.product_id}.webp`;
    
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td><img class="thumbMini" src="${imgSrc}" onerror="this.src='https://via.placeholder.com/40'"></td>
        <td>${item.product_name}<br><small style="color:#999">${item.product_id}</small></td>
        <td>${item.size}</td>
        <td>${item.color}</td>
        <td>${item.qty}</td>
        <td>${item.price.toFixed(2)}</td>
        <td><strong>${subtotal.toFixed(2)}</strong></td>
      </tr>
    `;
  });

  document.getElementById('totalsBox').innerHTML = `
    <div class="totalLine primary">
      <span>الإجمالي</span>
      <span>${total.toFixed(2)} ج.م</span>
    </div>
  `;
  document.getElementById('amountWords').textContent = numberToArabicWords(total);
}

function numberToArabicWords(n){
  if(n===0) return "صفر جنيه";
  const ones=["","واحد","اثنان","ثلاثة","أربعة","خمسة","ستة","سبعة","ثمانية","تسعة","عشرة","أحد عشر","اثنا عشر","ثلاثة عشر","أربعة عشر","خمسة عشر","ستة عشر","سبعة عشر","ثمانية عشر","تسعة عشر"];
  const tens=["","عشرة","عشرون","ثلاثون","أربعون","خمسون","ستون","سبعون","ثمانون","تسعون"];
  const h=["","مائة","مائتان","ثلاثمائة","أربعمائة","خمسمائة","ستمائة","سبعمائة","ثمانمائة","تسعمائة"];
  let s="";
  if(n>=1000){ let t=Math.floor(n/1000); s+=(t===2?"ألفان":(t>2&&t<11)?ones[t]+" آلاف":ones[t]+" ألف"); n%=1000; if(n>0)s+=" و"; }
  if(n>=100){ s+=h[Math.floor(n/100)]; n%=100; if(n>0)s+=" و"; }
  if(n>0){ if(n<20) s+=ones[n]; else { let t=Math.floor(n/10); let o=n%10; s+=o?ones[o]+" و "+tens[t]:tens[t]; } }
  return s+" جنيه مصري فقط لا غير";
}

/* === PRINTING ===*/
function getInvoiceData(){
  return {
    invNo: document.getElementById('invNo').value,
    date: document.getElementById('invDate').value,
    time: document.getElementById('invTime').value,
    customer: document.getElementById('custName').value,
    phone: document.getElementById('custPhone').value,
    address: document.getElementById('custAddress').value,
    notes: document.getElementById('custNotes').value,
    payment: document.getElementById('payMethod').value,
    items: Array.from(document.querySelectorAll('#itemsBody tr')).map(r => ({
      name: r.children[2].innerText, img: r.querySelector('img').src,
      size: r.children[3].innerText, color: r.children[4].innerText,
      qty: r.children[5].innerText, price: r.children[6].innerText, total: r.children[7].innerText
    })),
    grandTotal: document.querySelector('#totalsBox .primary span:last-child').innerText,
    words: document.getElementById('amountWords').innerText
  };
}

function buildA4Html(d){
  // دمج ستايل Last Piece مع قالب A4
  return `
    <html dir="rtl">
    <head>
    <style>
      body{font-family:'Tajawal',Arial;background:#fff;color:#333;margin:0;padding:20px;}
      .box{max-width:800px;margin:auto;border:2px solid #D4AF37;padding:20px;border-radius:10px;}
      .header{text-align:center;border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:20px;}
      .logo{width:80px;height:80px;border-radius:50%;border:2px solid #D4AF37;}
      h1{font-family:'Playfair Display',serif;color:#D4AF37;margin:5px 0;}
      table{width:100%;border-collapse:collapse;margin-top:15px;}
      th,td{border:1px solid #ddd;padding:8px;text-align:center;}
      th{background:#D4AF37;color:#fff;}
      .totals{text-align:right;margin-top:20px;font-size:18px;font-weight:bold;}
      .footer{text-align:center;margin-top:30px;color:#888;font-size:12px;}
    </style>
    </head>
    <body>
      <div class="box">
        <div class="header">
          <img src="${IMG_URL}logo.png" class="logo"><br>
          <h1>Last Piece</h1>
          <p>أناقة لا تُنسى</p>
        </div>
        <div style="display:flex;justify-content:space-between">
          <div><strong>فاتورة رقم:</strong> ${d.invNo}</div>
          <div><strong>التاريخ:</strong> ${d.date} - ${d.time}</div>
        </div>
        <hr style="border-style:dashed">
        <p><strong>العميل:</strong> ${d.customer} | <strong>هاتف:</strong> ${d.phone}</p>
        <p><strong>العنوان:</strong> ${d.address}</p>
        <table>
          <thead><tr><th>#</th><th>المنتج</th><th>المقاس</th><th>اللون</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
          <tbody>
            ${d.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.name}</td><td>${it.size}</td><td>${it.color}</td><td>${it.qty}</td><td>${it.price}</td><td>${it.total}</td></tr>`).join('')}
          </tbody>
        </table>
        <div class="totals">
          <div>الإجمالي: ${d.grandTotal}</div>
          <div style="font-size:14px; font-weight:normal">${d.words}</div>
        </div>
        <div class="footer">
          شكراً لتعاملكم معنا - Last Piece © ${new Date().getFullYear()}<br>
          تابعنا على Instagram: @lastpiece.eg
        </div>
      </div>
    </body>
    </html>
  `;
}

function buildThermalHtml(d, mm){
  const w = mm === 58 ? '58mm' : '80mm';
  return `
    <html dir="rtl">
    <head>
    <style>
      body{font-family:Tahoma,Arial;width:${w};margin:0;font-size:12px;}
      .center{text-align:center;} .b{font-weight:bold;} .sep{border-top:1px dashed #000;margin:5px 0;}
      table{width:100%;} .r{text-align:left;}
    </style>
    </head>
    <body>
      <div class="center">
        <img src="${IMG_URL}logo.png" style="width:60px;height:auto;"><br>
        <span class="b">Last Piece</span><br>
        أناقة لا تُنسى
      </div>
      <div class="sep"></div>
      <div class="b">فاتورة: ${d.invNo}</div>
      <div>${d.date} - ${d.time}</div>
      <div>العميل: ${d.customer}</div>
      <div>الهاتف: ${d.phone}</div>
      <div class="sep"></div>
      <table>
        ${d.items.map(it=>`<tr><td>${it.name}</td><td>x${it.qty}</td><td class="r">${it.total}</td></tr>`).join('')}
      </table>
      <div class="sep"></div>
      <div class="b" style="font-size:16px;text-align:center;">الإجمالي: ${d.grandTotal}</div>
      <div class="center" style="font-size:10px;margin-top:5px;">${d.words}</div>
      <div class="sep"></div>
      <div class="center" style="font-size:10px;">Last Piece © ${new Date().getFullYear()}</div>
    </body>
    </html>
  `;
}

function printInvoice(type){
  const data = getInvoiceData();
  let html = '';
  let title = 'فاتورة Last Piece';
  
  if(type === 'A4') html = buildA4Html(data);
  else html = buildThermalHtml(data, type === 'Thermal80' ? 80 : 58);
  
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 500);
}

async function savePdf(){
  const data = getInvoiceData();
  const html = buildA4Html(data);
  // استخدام html2pdf
  const element = document.createElement('div');
  element.innerHTML = html;
  
  const opt = {
    margin: 10,
    filename: `Invoice-${data.invNo}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  
  // حقن html2pdf مؤقتاً لأنه يعمل على DOM element
  document.body.appendChild(element);
  await html2pdf().set(opt).from(element).save();
  document.body.removeChild(element);
}

</script>
</body>
</html>
