<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="checkout-container">

  <h2>إتمام الطلب</h2>

  <div id="checkout-items"></div>

  <div class="form">

    <input type="text" id="name" placeholder="الاسم بالكامل">
    <input type="text" id="phone" placeholder="رقم الموبايل">
    <input type="text" id="address" placeholder="العنوان بالتفصيل">

    <button onclick="submitOrder()">تأكيد الطلب</button>

  </div>

</div>

<footer class="footer">

  <div class="footer-left">
    Last Piece © 2026
  </div>

  <div class="footer-center">
    <p>© 2024 Axentro – All Rights Reserved</p>
    <p>By Axentro Team</p>

    <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
      <img src="assets/images/qr.png" class="qr"/>
      <p>Scan Me / Click On Me</p>
    </a>
  </div>

</footer>

<script src="assets/js/checkout.js"></script>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("checkout-items");

let total = 0;

cart.forEach(item => {
  total += item.price * item.qty;

  container.innerHTML += `
    <div class="order-item">
      <img src="${item.image}">
      <div>
        <h4>${item.name}</h4>
        <p>${item.color} - ${item.size}</p>
        <p>${item.price} EGP × ${item.qty}</p>
      </div>
    </div>
  `;
});

container.innerHTML += `<h3>الإجمالي: ${total} EGP</h3>`;
</script>

</body>
</html>
