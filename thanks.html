<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الطلب بنجاح</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="thanks-container">

  <h1>🎉 تم استلام طلبك</h1>
  <p>سيتم التواصل معك خلال وقت قصير لتأكيد الطلب</p>

  <div id="orderSummary" class="grid"></div>

  <h2 id="totalPrice"></h2>

  <a href="index.html" class="back-btn">العودة للرئيسية</a>

</div>

<!-- FOOTER -->
<footer class="footer">

  <div>
    <img src="assets/images/logo.png">
    <p>Last Piece © 2026</p>
  </div>

  <div>
    <img src="assets/images/qr.png" class="qr"
      onclick="window.open('https://axentro.com','_blank')">
    <p>Scan Me</p>
  </div>

</footer>

<script>

const data = JSON.parse(localStorage.getItem("lastOrder") || "[]");

let total = 0;

const container = document.getElementById("orderSummary");

data.forEach(p => {

  const img = `https://raw.githubusercontent.com/axentro-official/Last-piece-/main/assets/images/${p.id}-1.webp`;

  const price = p.discount_price || p.price;

  total += price;

  container.innerHTML += `
    <div class="card">
      <img src="${img}">
      <div style="padding:10px">
        <h4>${p.name}</h4>
        <p>${price} ج</p>
      </div>
    </div>
  `;
});

document.getElementById("totalPrice").innerText = "الإجمالي: " + total + " ج";

</script>

</body>
</html>
