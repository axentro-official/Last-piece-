<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/style.css">
<title>تم الطلب</title>
</head>

<body>

<div class="container">

<h2>تم استلام طلبك بنجاح</h2>

<div id="summary"></div>

</div>

<footer>
  <div>Last Piece © 2026</div>

  <div class="footer-center">
    © 2024 Axentro – All Rights Reserved <br>
    By Axentro Team
    <br>
    <img src="assets/images/qr.png"
    onclick="window.open('https://axentro-official.github.io/axentro-website/links.html')">
    <p>Scan Me / Click On Me</p>
  </div>
</footer>

<script>
let order = JSON.parse(localStorage.getItem("lastOrder"));

if(!order){
  document.getElementById("summary").innerHTML = "<p>لا يوجد طلب</p>";
}else{

  let html = `
    <h3>رقم الطلب: ${order.order_id}</h3>
    <p>الاسم: ${order.customer_name}</p>
    <p>الإجمالي: ${order.total} جنيه</p>
    <p>الدفع: ${order.payment}</p>
    <hr>
  `;

  order.items.forEach(p=>{
    html += `<p>${p.name} × ${p.qty}</p>`;
  });

  document.getElementById("summary").innerHTML = html;
}
</script>

</body>
</html>
