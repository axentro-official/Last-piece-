<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الطلب</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="container thanks">

  <h2>تم استلام طلبك بنجاح 🎉</h2>

  <div id="summary" class="summary"></div>

  <h3 id="total"></h3>

  <a href="index.html" class="btn primary">العودة للرئيسية</a>

</div>

<footer class="footer">
  <div class="footer-left">Last Piece © 2026</div>

  <div class="footer-center">
    © 2024 Axentro – All Rights Reserved<br>
    By Axentro Team
    <br>
    <img class="qr"
      src="assets/images/qr.png"
      onclick="window.open('https://axentro-official.github.io/axentro-website/links.html','_blank')">
    <p class="scan">Scan Me / Click On Me</p>
  </div>
</footer>

<script>
const order = JSON.parse(localStorage.getItem("lastOrder") || "null");

if(!order){
  document.getElementById("summary").innerHTML = "لا يوجد طلب";
}else{
  let html = "";
  let total = 0;

  order.items.forEach(p=>{
    total += p.price * p.qty;
    html += `
      <div class="row">
        <span>${p.name}</span>
        <span>${p.qty} × ${p.price}</span>
      </div>
    `;
  });

  document.getElementById("summary").innerHTML = html;
  document.getElementById("total").innerText = "الإجمالي: " + total + " ج";
}
</script>

</body>
</html>
