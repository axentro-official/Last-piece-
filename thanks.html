<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الطلب</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="thanks-container">
  <div class="card">

    <h1>تم استلام طلبك بنجاح ✔</h1>
    <p>سيتم التواصل معك قريبًا</p>

    <div id="order-items"></div>

    <a href="index.html" class="btn">الرجوع للرئيسية</a>

  </div>
</div>

<footer class="footer">
  <div class="footer-left">
    Last Piece © 2026
  </div>

  <div class="footer-center">
    <p>© 2024 Axentro – All Rights Reserved</p>
    <p>By Axentro Team</p>

    <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
      <img src="assets/images/qr.png" class="qr"/>
      <p>Scan Me / Click On Me</p>
    </a>
  </div>
</footer>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("order-items");

cart.forEach(item => {
  container.innerHTML += `
    <div class="order-item">
      <img src="${item.image}">
      <div>
        <h4>${item.name}</h4>
        <p>${item.color} - ${item.size}</p>
        <p>${item.price} EGP</p>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
